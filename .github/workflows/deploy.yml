name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - 'pipeline/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/wbc-dashboard
            git pull origin main
            cd pipeline
            docker compose down
            docker compose up --build -d
            echo "Deploy complete"