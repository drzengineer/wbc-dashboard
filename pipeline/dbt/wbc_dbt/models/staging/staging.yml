version: 2

models:
  - name: stg_wbc__players
    description: >
      Staging model for WBC player data. 
      Optimized schema with 17 redundant fields removed while maintaining all analytical value.
    columns:
      - name: player_id
        description: Player unique identifier number
        tests:
          - unique
          - not_null
      - name: ingested_at
        description: Timestamp when the record was ingested into the system (UTC timezone)
        tests:
          - not_null
      - name: active
        description: Indicates if the player is currently active in the league
      - name: gender
        description: Player gender code ("M" = Male)
      - name: height
        description: Player height in feet/inches format
      - name: weight
        description: Player weight in pounds (lbs)
      - name: bat_side_code
        description: Batting side code (R = Right, L = Left, S = Switch)
      - name: use_name
        description: Preferred nickname/short name the player goes by
      - name: full_name
        description: Player's full display name
      - name: last_name
        description: Player's family/last name
      - name: birth_city
        description: City where the player was born
      - name: birth_date
        description: Player's date of birth (YYYY-MM-DD format)
      - name: first_name
        description: Player's legal first name
      - name: pitch_hand_code
        description: Pitching hand code (R = Right, L = Left)
      - name: current_age
        description: Player's current calculated age in years
      - name: is_verified
        description: Indicates if player profile has been verified
      - name: middle_name
        description: Player's middle name
      - name: current_team_id
        description: Unique identifier for the player's current team
      - name: use_last_name
        description: Preferred last name for display
      - name: birth_country
        description: Country where the player was born
      - name: boxscore_name
        description: Short name used in game boxscores
      - name: mlb_debut_date
        description: Date player made their MLB debut (YYYY-MM-DD format)
      - name: primary_number
        description: Player's jersey number
      - name: strike_zone_top
        description: Measured top coordinate of player's strike zone
      - name: primary_position_code
        description: Numeric position code identifier
      - name: primary_position_name
        description: Full name of player's primary position
      - name: primary_position_type
        description: Position category type
      - name: primary_position_abbreviation
        description: Standard position abbreviation
      - name: strike_zone_bottom
        description: Measured bottom coordinate of player's strike zone

  - name: stg_wbc__schedule
    description: >
      Staging model for WBC schedule / game data.
      Optimized schema with 22 unnecessary fields removed while maintaining all practical analytical value.
    columns:
      - name: game_pk
        description: Game primary key identifier number
        tests:
          - unique
          - not_null
      - name: ingested_at
        description: Timestamp when the record was ingested into the system (UTC timezone)
        tests:
          - not_null
      - name: game_guid
        description: Globally unique identifier for this game
      - name: game_type
        description: Game type code (W = World Baseball Classic)
      - name: season
        description: Season year for this game
      - name: game_date
        description: Game scheduled start timestamp in UTC ISO format
      - name: official_date
        description: Official game date in YYYY-MM-DD format
      - name: day_night
        description: Indicates if game is played during 'day' or 'night'
      - name: description
        description: Game series or round description
      - name: series_description
        description: Full description of the game series
      - name: is_tie
        description: Indicates if this game ended in a tie
      - name: status_code
        description: Short status code for the game
      - name: start_time_tbd
        description: Indicates if game start time is to be determined
      - name: coded_game_state
        description: Coded game state identifier
      - name: abstract_game_code
        description: Abstract game state code
      - name: game_number
        description: Game number in doubleheader or series
      - name: double_header
        description: Double header game indicator code
      - name: tiebreaker
        description: Tiebreaker indicator code
      - name: if_necessary
        description: Indicates if game is an 'if necessary' game
      - name: gameday_type
        description: Game day type code
      - name: games_in_series
        description: Total number of games in this series
      - name: series_game_number
        description: Game number within the series
      - name: inning_break_length
        description: Length of inning break in seconds
      - name: reverse_home_away_status
        description: Indicates if home/away designations are reversed
      - name: venue_id
        description: Venue unique identifier
      - name: venue_name
        description: Full name of the game stadium/venue
      - name: away_team_id
        description: Away team unique identifier
      - name: away_team_name
        description: Full name of the away team
      - name: away_score
        description: Final score total for the away team
      - name: away_is_winner
        description: Indicates if the away team won this game
      - name: away_split_squad
        description: Indicates if this is a split squad team roster
      - name: away_series_number
        description: Game sequence number within the series
      - name: away_win_pct
        description: Winning percentage for the away team
      - name: away_wins
        description: Total season wins for the away team
      - name: away_losses
        description: Total season losses for the away team
      - name: home_team_id
        description: Home team unique identifier
      - name: home_team_name
        description: Full name of the home team
      - name: home_score
        description: Final score total for the home team
      - name: home_is_winner
        description: Indicates if the home team won this game
      - name: home_split_squad
        description: Indicates if this is a split squad team roster
      - name: home_series_number
        description: Game sequence number within the series
      - name: home_win_pct
        description: Winning percentage for the home team
      - name: home_wins
        description: Total season wins for the home team
      - name: home_losses
        description: Total season losses for the home team
      - name: outs
        description: Number of outs recorded in current inning
      - name: balls
        description: Current pitch count balls
      - name: strikes
        description: Current pitch count strikes
      - name: inning_half
        description: Which half of the inning is currently being played (Top/Bottom)
      - name: inning_state
        description: Current inning state
      - name: current_inning
        description: Current inning number being played
      - name: scheduled_innings
        description: Total number of scheduled innings for this game
      - name: away_hits
        description: Total hits for away team
      - name: away_runs
        description: Total runs scored for away team
      - name: away_errors
        description: Total errors committed by away team
      - name: away_left_on_base
        description: Total runners left on base for away team
      - name: home_hits
        description: Total hits for home team
      - name: home_runs
        description: Total runs scored for home team
      - name: home_errors
        description: Total errors committed by home team
      - name: home_left_on_base
        description: Total runners left on base for home team
      - name: innings
        description: Array container with per-inning breakdown data

  - name: stg_wbc__boxscores
    description: >
      Staging model for WBC boxscores data.
      Optimized schema with 28 unnecessary fields removed while maintaining all practical analytical value.
      All season statistics and team dimension fields have been intentionally retained.
    columns:
      - name: game_pk
        description: Unique game primary key identifier
        tests:
          - unique
          - not_null
      - name: ingested_at
        description: Timestamp when the record was ingested into the system (UTC timezone)
        tests:
          - not_null
      - name: info
        description: Array of general game information objects
      - name: away_team_data
        description: Full away team boxscore data object (contains stats, players, team info)
      - name: home_team_data
        description: Full home team boxscore data object (contains stats, players, team info)
      - name: away_team_id
        description: Away team unique identifier
      - name: away_team_name
        description: Full name of the away team
      - name: home_team_id
        description: Home team unique identifier
      - name: home_team_name
        description: Full name of the home team