version: 2

# =============================================================================
# FACT TABLES
# =============================================================================
# Pure normalized facts. Keys and measures only.
# Source data comes exclusively from the int layer.
# No dim attributes are joined here — that happens in the agg layer.

models:

  - name: fct_team_game_stats
    description: >
      One row per team per game. Keys and measures only — no dimension attributes.
      All descriptive context (team name, game date, venue, pool) is joined
      in at the agg layer. Source is int_wbc__game_teams exclusively.
      Grain: game_pk + team_id.
    columns:
      - name: game_team_id
        description: Surrogate primary key. Hash of game_pk and team_id.
        tests:
          - unique
          - not_null
      - name: game_pk
        description: Foreign key to dim_games.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_games')
                field: game_pk
      - name: team_id
        description: Foreign key to dim_teams (this team).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_teams')
                field: team_id
      - name: opponent_team_id
        description: Foreign key to dim_teams (the opponent).
      - name: is_winner
        description: Whether this team won the game.
        tests:
          - not_null
      - name: score
        description: This team's final score.
      - name: opponent_score
        description: The opponent's final score.
      - name: run_differential
        description: score minus opponent_score. Positive = win margin, negative = loss margin.
      - name: wins
        description: This team's win total as of this game.
      - name: losses
        description: This team's loss total as of this game.
      - name: win_pct
        description: This team's winning percentage as of this game.
      - name: hits
        description: Total hits from the schedule box score line.
      - name: runs
        description: Total runs from the schedule box score line.
      - name: errors
        description: Total errors from the schedule box score line.
      - name: left_on_base
        description: Total runners left on base.
      - name: batting_plate_appearances
        description: Team total plate appearances.
      - name: batting_at_bats
        description: Team total at bats.
      - name: batting_runs
        description: Team total runs.
      - name: batting_hits
        description: Team total hits.
      - name: batting_doubles
        description: Team total doubles.
      - name: batting_triples
        description: Team total triples.
      - name: batting_home_runs
        description: Team total home runs.
      - name: batting_rbi
        description: Team total RBI.
      - name: batting_walks
        description: Team total walks.
      - name: batting_intentional_walks
        description: Team total intentional walks.
      - name: batting_strikeouts
        description: Team total strikeouts.
      - name: batting_hit_by_pitch
        description: Team total hit by pitch.
      - name: batting_sac_bunts
        description: Team total sacrifice bunts.
      - name: batting_sac_flies
        description: Team total sacrifice flies.
      - name: batting_stolen_bases
        description: Team total stolen bases.
      - name: batting_caught_stealing
        description: Team total caught stealing.
      - name: batting_left_on_base
        description: Team total left on base from boxscore teamStats.
      - name: batting_total_bases
        description: Team total bases.
      - name: batting_gidp
        description: Team total grounded into double plays.
      - name: pitching_outs
        description: Team total outs recorded by pitching staff.
      - name: pitching_hits_allowed
        description: Team total hits allowed.
      - name: pitching_runs_allowed
        description: Team total runs allowed.
      - name: pitching_earned_runs
        description: Team total earned runs.
      - name: pitching_home_runs_allowed
        description: Team total home runs allowed.
      - name: pitching_strikeouts
        description: Team total strikeouts recorded.
      - name: pitching_walks
        description: Team total walks issued.
      - name: pitching_intentional_walks
        description: Team total intentional walks issued.
      - name: pitching_hit_batsmen
        description: Team total batters hit by pitch.
      - name: pitching_wild_pitches
        description: Team total wild pitches.
      - name: pitching_balks
        description: Team total balks.
      - name: pitching_total_pitches
        description: Team total pitches thrown.
      - name: pitching_balls
        description: Team total ball calls.
      - name: pitching_strikes
        description: Team total strike calls.
      - name: pitching_batters_faced
        description: Team total batters faced.
      - name: pitching_inherited_runners
        description: Team total inherited runners.
      - name: pitching_inherited_runners_scored
        description: Team total inherited runners that scored.
      - name: fielding_errors
        description: Team total fielding errors.
      - name: fielding_assists
        description: Team total fielding assists.
      - name: fielding_put_outs
        description: Team total put outs.
      - name: fielding_chances
        description: Team total fielding chances.
      - name: fielding_passed_balls
        description: Team total passed balls.
      - name: fielding_pickoffs
        description: Team total pickoffs.
      - name: ingested_at
        description: Timestamp when the row was ingested.
        tests:
          - not_null

  - name: fct_player_game_stats
    description: >
      One row per player per game. Keys and measures only — no dimension attributes.
      All descriptive context (player name, position, team name, game date) is
      joined in at the agg layer. Source is int_wbc__game_players exclusively.
      Season snapshot stats excluded — tournament totals are computed fresh
      in agg_player_tournament_stats from these raw game counts.
      Grain: game_pk + player_id.
    columns:
      - name: game_player_id
        description: Surrogate primary key. Hash of game_pk and player_id.
        tests:
          - unique
          - not_null
      - name: game_pk
        description: Foreign key to dim_games.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_games')
                field: game_pk
      - name: player_id
        description: Foreign key to dim_players.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_players')
                field: player_id
      - name: team_id
        description: Foreign key to dim_teams.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_teams')
                field: team_id
      - name: batting_order
        description: Batting order position (1-9). Null for pitchers and bench players not in the lineup.
      - name: is_on_bench
        description: Whether the player was on the bench.
      - name: is_substitute
        description: Whether the player entered as a substitute.
      - name: is_current_batter
        description: Whether the player was the current batter at time of data capture.
      - name: is_current_pitcher
        description: Whether the player was the current pitcher at time of data capture.
      - name: batting_plate_appearances
        description: Plate appearances in this game.
      - name: batting_at_bats
        description: At bats in this game.
      - name: batting_runs
        description: Runs scored in this game.
      - name: batting_hits
        description: Hits in this game.
      - name: batting_doubles
        description: Doubles in this game.
      - name: batting_triples
        description: Triples in this game.
      - name: batting_home_runs
        description: Home runs in this game.
      - name: batting_rbi
        description: RBI in this game.
      - name: batting_walks
        description: Walks in this game.
      - name: batting_intentional_walks
        description: Intentional walks in this game.
      - name: batting_strikeouts
        description: Strikeouts in this game.
      - name: batting_hit_by_pitch
        description: Times hit by pitch in this game.
      - name: batting_sac_bunts
        description: Sacrifice bunts in this game.
      - name: batting_sac_flies
        description: Sacrifice flies in this game.
      - name: batting_stolen_bases
        description: Stolen bases in this game.
      - name: batting_caught_stealing
        description: Times caught stealing in this game.
      - name: batting_left_on_base
        description: Runners left on base in this game.
      - name: batting_total_bases
        description: Total bases in this game.
      - name: batting_gidp
        description: Grounded into double plays in this game.
      - name: batting_ground_outs
        description: Ground outs in this game.
      - name: batting_air_outs
        description: Air outs in this game.
      - name: batting_pickoffs
        description: Times picked off in this game.
      - name: pitching_outs
        description: Outs recorded in this game. Null for non-pitchers.
      - name: pitching_total_pitches
        description: Total pitches thrown in this game.
      - name: pitching_strikes
        description: Total strikes thrown in this game.
      - name: pitching_balls
        description: Total balls thrown in this game.
      - name: pitching_hits_allowed
        description: Hits allowed in this game.
      - name: pitching_runs_allowed
        description: Runs allowed in this game.
      - name: pitching_earned_runs
        description: Earned runs allowed in this game.
      - name: pitching_home_runs_allowed
        description: Home runs allowed in this game.
      - name: pitching_strikeouts
        description: Strikeouts recorded in this game.
      - name: pitching_walks
        description: Walks issued in this game.
      - name: pitching_intentional_walks
        description: Intentional walks issued in this game.
      - name: pitching_hit_batsmen
        description: Batters hit by pitch in this game.
      - name: pitching_wild_pitches
        description: Wild pitches in this game.
      - name: pitching_balks
        description: Balks in this game.
      - name: pitching_batters_faced
        description: Total batters faced in this game.
      - name: pitching_inherited_runners
        description: Inherited runners in this game.
      - name: pitching_inherited_runners_scored
        description: Inherited runners that scored in this game.
      - name: pitching_wins
        description: Win recorded in this game.
      - name: pitching_losses
        description: Loss recorded in this game.
      - name: pitching_saves
        description: Save recorded in this game.
      - name: pitching_holds
        description: Hold recorded in this game.
      - name: pitching_blown_saves
        description: Blown save recorded in this game.
      - name: pitching_games_started
        description: Whether this pitcher started the game (0 or 1).
      - name: fielding_errors
        description: Fielding errors in this game.
      - name: fielding_assists
        description: Fielding assists in this game.
      - name: fielding_put_outs
        description: Put outs recorded in this game.
      - name: fielding_chances
        description: Fielding chances in this game.
      - name: fielding_passed_balls
        description: Passed balls in this game.
      - name: fielding_pickoffs
        description: Pickoffs recorded in this game.
      - name: ingested_at
        description: Timestamp when the row was ingested.
        tests:
          - not_null

  - name: fct_game_innings
    description: >
      One row per team per inning per game. Fully atomic — keys and measures only,
      no dimension attributes. All descriptive context is joined at the agg layer
      or by the frontend via dim joins. Source is int_wbc__game_innings exclusively.
      Grain: game_pk + team_id + inning_num.
    columns:
      - name: game_inning_team_id
        description: Surrogate primary key. Hash of game_pk, team_id, and inning_num.
        tests:
          - unique
          - not_null
      - name: game_pk
        description: Foreign key to dim_games.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_games')
                field: game_pk
      - name: team_id
        description: Foreign key to dim_teams.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_teams')
                field: team_id
      - name: inning_num
        description: Inning number (1-based).
        tests:
          - not_null
      - name: ordinal_num
        description: Human-readable inning label (e.g. "1st", "2nd") intrinsic to the grain.
      - name: runs
        description: Runs scored by this team in this inning.
      - name: hits
        description: Hits recorded by this team in this inning.
      - name: errors
        description: Errors committed by this team in this inning.
      - name: left_on_base
        description: Runners left on base by this team in this inning.
      - name: ingested_at
        description: Timestamp when the row was ingested.
        tests:
          - not_null

# =============================================================================
# AGGREGATE TABLES
# =============================================================================
# Pre-computed tournament-level summaries built on top of fact tables.
# This is the first place in the lineage where dim attributes are joined in.
# Rate stats (AVG, ERA, WHIP, OBP, SLG, etc.) are computed here from
# summed counts — never on the fact tables.

  - name: agg_team_tournament_stats
    description: >
      One row per team per tournament (season + pool). Sums all counting stats
      from fct_team_game_stats and computes rates from those totals.
      Dim attributes (team name, division, etc.) are joined here for the first
      time in the mart lineage.
      Primary table for team leaderboards, standings, and comparison views.
      Grain: team_id + season + pool.
    columns:
      - name: team_tournament_id
        description: Surrogate primary key. Hash of team_id, season, and pool.
        tests:
          - unique
          - not_null
      - name: team_id
        description: Foreign key to dim_teams.
        tests:
          - not_null
      - name: season
        description: Season (tournament year).
        tests:
          - not_null
      - name: pool
        description: Pool description (e.g. "Pool A, Tokyo Dome").
      - name: team_name
        description: Full team name. Joined from dim_teams.
      - name: team_abbreviation
        description: Team abbreviation. Joined from dim_teams.
      - name: division_id
        description: Division (pool) ID. Joined from dim_teams.
      - name: division_name
        description: Division (pool) name. Joined from dim_teams.
      - name: league_name
        description: League name. Joined from dim_teams.
      - name: games_played
        description: Total games played in this pool and season.
      - name: wins
        description: Total wins.
      - name: losses
        description: Total losses.
      - name: win_pct
        description: Derived win percentage (wins / games_played).
      - name: total_runs_scored
        description: Total runs scored across all games.
      - name: total_runs_allowed
        description: Total runs allowed across all games.
      - name: total_run_differential
        description: Total runs scored minus total runs allowed.
      - name: innings_pitched
        description: Total innings pitched in baseball convention (e.g. 4.2 = 4 innings + 2 outs).
      - name: batting_avg
        description: Derived AVG from tournament totals. hits / at_bats.
      - name: on_base_pct
        description: Derived OBP. (H+BB+HBP) / (AB+BB+HBP+SF).
      - name: slugging_pct
        description: Derived SLG. total_bases / at_bats.
      - name: ops
        description: Derived OPS. OBP + SLG from tournament totals.
      - name: stolen_base_pct
        description: Derived SB%. stolen_bases / (stolen_bases + caught_stealing).
      - name: era
        description: Derived ERA. earned_runs * 27 / pitching_outs. Null when outs = 0.
      - name: whip
        description: Derived WHIP. (walks + hits) * 3 / pitching_outs. Null when outs = 0.
      - name: strike_pct
        description: Derived strike percentage. strikes / total_pitches.
      - name: k_rate
        description: Derived strikeout rate. strikeouts / batters_faced.
      - name: bb_rate
        description: Derived walk rate. walks / batters_faced.
      - name: fielding_pct
        description: Derived fielding percentage. (put_outs + assists) / chances.

  - name: agg_player_tournament_stats
    description: >
      One row per player per tournament (season + pool). Sums all counting stats
      from fct_player_game_stats and computes rates from those totals.
      Dim attributes (player name, position, team name, etc.) are joined here
      for the first time in the mart lineage.
      Season snapshot stats from the source API are excluded — all stats here
      are WBC-specific and computed from raw game-level counts.
      Primary table for player leaderboards, stat leaders, and roster views.
      Grain: player_id + team_id + season + pool.
    columns:
      - name: player_tournament_id
        description: Surrogate primary key. Hash of player_id, team_id, season, and pool.
        tests:
          - unique
          - not_null
      - name: player_id
        description: Foreign key to dim_players.
        tests:
          - not_null
      - name: team_id
        description: Foreign key to dim_teams.
        tests:
          - not_null
      - name: season
        description: Season (tournament year).
        tests:
          - not_null
      - name: pool
        description: Pool description.
      - name: full_name
        description: Player full name. Joined from dim_players.
      - name: boxscore_name
        description: Boxscore name. Joined from dim_players.
      - name: primary_position_code
        description: Primary position code. Joined from dim_players.
      - name: primary_position_name
        description: Primary position name. Joined from dim_players.
      - name: primary_position_type
        description: Primary position type. Joined from dim_players.
      - name: primary_position_abbreviation
        description: Primary position abbreviation. Joined from dim_players.
      - name: bat_side_code
        description: Batting side code. Joined from dim_players.
      - name: pitch_hand_code
        description: Pitching hand code. Joined from dim_players.
      - name: birth_country
        description: Birth country. Joined from dim_players.
      - name: team_name
        description: Team name. Joined from dim_teams.
      - name: team_abbreviation
        description: Team abbreviation. Joined from dim_teams.
      - name: division_id
        description: Division (pool) ID. Joined from dim_teams.
      - name: division_name
        description: Division (pool) name. Joined from dim_teams.
      - name: league_name
        description: League name. Joined from dim_teams.
      - name: is_pitcher
        description: True if the player started as pitcher in any game this tournament.
      - name: has_started
        description: True if the player started at least one game.
      - name: games_played
        description: Number of distinct games the player appeared in.
      - name: games_started
        description: Games where the player was not a bench player or substitute.
      - name: games_started_pitching
        description: Games where the player was the starting pitcher.
      - name: innings_pitched
        description: Total innings pitched in baseball convention. Null for non-pitchers.
      - name: batting_avg
        description: Derived AVG from tournament totals. Null when at_bats = 0.
      - name: on_base_pct
        description: Derived OBP. Null when denominator = 0.
      - name: slugging_pct
        description: Derived SLG. Null when at_bats = 0.
      - name: ops
        description: Derived OPS from tournament totals. Null when denominators = 0.
      - name: stolen_base_pct
        description: Derived SB%. Null when (SB + CS) = 0.
      - name: batting_k_rate
        description: Batting strikeout rate per plate appearance.
      - name: batting_bb_rate
        description: Batting walk rate per plate appearance.
      - name: era
        description: Derived ERA. Null for non-pitchers or when outs = 0.
      - name: whip
        description: Derived WHIP. Null for non-pitchers or when outs = 0.
      - name: strike_pct
        description: Pitching strike percentage. Null for non-pitchers.
      - name: k_rate
        description: Pitching strikeout rate per batter faced. Null for non-pitchers.
      - name: bb_rate
        description: Pitching walk rate per batter faced. Null for non-pitchers.
      - name: fielding_pct
        description: Derived fielding percentage. Null when chances = 0.
